<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            margin-top: 100px;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            width: 250px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #2c7be5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a5edb;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Visor Electoral Chiapas</h2>
    <p>Iniciar sesión</p>

    <!-- 🔥 FORMULARIO CORRECTO -->
    <form method="POST" action="{{ url_for('login') }}">

        <input type="text" name="usuario" placeholder="Usuario" required>
        <br>

        <input type="password" name="password" placeholder="Contraseña" required>
        <br><br>

        <button type="submit">Entrar</button>

    </form>

    <!-- MENSAJE DE ERROR -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

</div>

<footer>
    Creado por Baldemar Maza León
</footer>

<!-- 🔒 EVITA VOLVER ATRÁS DESPUÉS DE LOGIN -->
<script>
window.addEventListener('pageshow', function (event) {
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
        window.location.href = "/";
    }
});
</script>

</body>
</html>
